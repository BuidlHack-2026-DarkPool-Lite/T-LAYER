<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: #050505;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.logo {
  margin-bottom: 28px;
  position: relative;
  filter: drop-shadow(0 0 24px rgba(16,185,129,0.3));
}
.logo svg { width: 72px; height: 72px; color: #34d399; }
.title {
  font-size: 52px; font-weight: 700; color: white;
  letter-spacing: -1px; margin-bottom: 8px;
  position: relative;
}
.subtitle {
  font-size: 20px; color: #737373;
  margin-bottom: 40px;
  position: relative;
}
.features {
  display: flex; gap: 40px;
  position: relative;
}
.feature {
  display: flex; align-items: center; gap: 8px;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 14px; color: #a3a3a3;
}
.dot {
  width: 7px; height: 7px;
  background: #34d399;
  border-radius: 50%;
}
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 11px; color: #525252;
  border-top: 1px solid #1a1a1a;
}
</style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="2,4 22,4 20,7.5 4,7.5" fill="currentColor" />
      <polygon points="5,10.5 19,10.5 17.5,14 6.5,14" fill="currentColor" opacity="0.5" />
      <polygon points="7.5,16.5 16.5,16.5 15.5,20 8.5,20" fill="currentColor" opacity="0.25" />
    </svg>
  </div>
  <div class="title">T-LAYER</div>
  <div class="subtitle">Private OTC Trading on BNB Chain</div>
  <div class="features">
    <div class="feature"><div class="dot"></div>TEE Matching</div>
    <div class="feature"><div class="dot"></div>NEAR AI</div>
    <div class="feature"><div class="dot"></div>Zero Leakage</div>
    <div class="feature"><div class="dot"></div>Atomic Settlement</div>
  </div>
  <div class="bottom-bar">BNB Chain &middot; BuidlHack 2026</div>
</body>
</html>
