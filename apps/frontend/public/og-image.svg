  </text>

  <!-- Features -->
  <g transform="translate(600, 460)" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14">
    <circle cx="-220" cy="-4" r="4" fill="#34d399"/>
    <text x="-200" fill="#a3a3a3" text-anchor="start">TEE Matching</text>
    <circle cx="-20" cy="-4" r="4" fill="#34d399"/>
    <text x="0" fill="#a3a3a3" text-anchor="start">NEAR AI</text>
    <circle cx="140" cy="-4" r="4" fill="#34d399"/>
    <text x="160" fill="#a3a3a3" text-anchor="start">Zero Leakage</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#0a0a0a"/>
  <text x="600" y="624" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#525252">
