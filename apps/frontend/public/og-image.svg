<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#262626" stroke-width="1"/>

  <!-- Logo eye icon -->
  <g transform="translate(540, 160)">
    <rect x="0" y="0" width="120" height="120" rx="24" fill="#171717" stroke="#333" stroke-width="1"/>
    <g transform="translate(60, 60) scale(2.5)">
      <path d="M-11 0 C-7 -9 7 -9 11 0 C 7 9 -7 9 -11 0 Z" fill="none" stroke="#d4d4d4" stroke-width="1.2"/>
      <line x1="-1.75" y1="-13" x2="1.75" y2="13" stroke="#d4d4d4" stroke-width="3.5" transform="rotate(-45)"/>
      <rect x="-6" y="-3.5" width="2.5" height="1.5" fill="#d4d4d4"/>
      <rect x="-7.5" y="-1" width="5.5" height="1.5" fill="#d4d4d4"/>
      <rect x="-9.5" y="1.5" width="4.5" height="1.5" fill="#d4d4d4"/>
      <rect x="-6.5" y="4" width="4.5" height="1.5" fill="#d4d4d4"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">
