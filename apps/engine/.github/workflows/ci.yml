name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: uv 설치
        uses: astral-sh/setup-uv@v6

      - name: 의존성 설치
        run: uv sync

      - name: 린트
        run: uv run ruff check .

      - name: 테스트
        run: uv run pytest -v --tb=short
